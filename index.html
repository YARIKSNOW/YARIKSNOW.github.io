<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивная карта тревог ПФО от @radarPF0</title>
    <!-- 1. Подключаем стили карты Leaflet (Строго как на оригинальном сайте) -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        /* Полностью убираем отступы, чтобы карта была на весь экран */
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: white; display: flex; overflow: hidden; }
        
        /* Главное окно интерактивной карты */
        #map { flex: 1; height: 100%; width: 100%; z-index: 1; background-color: #151515; }
        
        /* Стильный пульт управления справа */
        .sidebar { width: 330px; min-width: 330px; background-color: #1a1a1a; border-left: 2px solid #2d2d2d; padding: 20px; display: flex; flex-direction: column; z-index: 10; box-shadow: -5px 0 15px rgba(0,0,0,0.5); box-sizing: border-box; }
        h1 { font-size: 16px; margin-top: 0; color: #00e5ff; border-bottom: 1px solid #2d2d2d; padding-bottom: 10px; text-align: center; font-weight: bold; letter-spacing: 1px; }
        label { font-size: 11px; color: #aaa; margin-top: 12px; display: block; text-align: left; }
        
        /* Кнопки и выпадающий список */
        select, button { width: 100%; padding: 11px; margin: 5px 0; font-size: 13px; font-weight: bold; border-radius: 6px; border: none; box-sizing: border-box; }
        select { background-color: #2d2d2d; color: white; border: 1px solid #3a3a3a; cursor: pointer; }
        button { cursor: pointer; transition: transform 0.1s; color: white; }
        button:active { transform: scale(0.98); }
        
        /* Боевые цвета кнопок */
        .btn-safe { background-color: #2e7d32; }
        .btn-attention { background-color: #fbc02d; color: black; }
        .btn-bpla { background-color: #ef6c00; }
        .btn-alarm { background-color: #c62828; }
        .btn-rocket { background-color: #4a0002; }
        .btn-clear { background-color: #37474f; border: 1px dashed #546e7a; margin-top: 12px; }
        
        p { font-size: 11px; color: #555; text-align: center; margin-top: auto; }
    </style>
</head>
<body>

    <!-- ОКНО ЖИВОЙ КАРТЫ МИРА -->
    <div id="map"></div>

    <!-- БОКОВОЙ ПУЛЬТ УПРАВЛЕНИЯ -->
    <div class="sidebar">
        <h1>📡 МОНИТОР ПФО v5.5</h1>
        
        <label for="city-select">Выберите сектор контроля:</label>
        <select id="city-select" onchange="focusCity()">
            <option value="izhevsk">📍 Ижевск (Удмуртия)</option>
            <option value="kirov">📍 Киров (Кировская обл.)</option>
            <option value="kazan">📍 Казань (Татарстан)</option>
            <option value="samara">📍 Самара (Самарская обл.)</option>
            <option value="ufa">📍 Уфа (Башкирия)</option>
            <option value="perm">📍 Пермь (Пермский край)</option>
            <option value="nn">📍 Нижний Новгород</option>
            <option value="saratov">📍 Саратов (Саратовская обл.)</option>
        </select>

        <label>Установить статус опасности:</label>
        <button class="btn-safe" onclick="applyStatus('safe')">🟢 1. Полный отбой</button>
        <button class="btn-attention" onclick="setStatusColor('#fbc02d', '🟡 Внимание по БпЛА')">🟡 2. Внимание по БпЛА</button>
        <button class="btn-bpla" onclick="setStatusColor('#ef6c00', '🟠 Опасность по БпЛА')">🟠 3. Опасность по БпЛА</button>
        <button class="btn-alarm" onclick="setStatusColor('#c62828', '🔴 Тревога по БпЛА')">🔴 4. Тревога по БпЛА</button>
        <button class="btn-rocket" onclick="setStatusColor('#4a0002', '⚫ РАКЕТНАЯ ОПАСНОСТЬ')">⚫ 5. РАКЕТНАЯ ОПАСНОСТЬ</button>
        
        <button class="btn-clear" onclick="resetAll()">🔄 Сбросить все сектора</button>
        
        <p>Ситуационный радар ПФО • Ссылка на ТГ: @radarPF0</p>
    </div>

    <!-- 2. Подключаем сам движок карт Leaflet (Строго оригинальная ссылка) -->
    <script src="https://unpkg.com"></script>
    <script>
        // Запускаем карту мира и наводим камеру строго на наш Ижевск
        const map = L.map('map').setView([56.85, 53.20], 6);

        // Стандартная, чистая подложка OpenStreetMap (которая 100% работает на домене github.io)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // База данных наших секторов ПФО
        const sectors = {
            "izhevsk": { name: "Ижевск (Удмуртия)", coords: [56.85, 53.20], circle: null },
            "kirov": { name: "Киров", coords: [58.60, 49.66], circle: null },
            "kazan": { name: "Казань (Татарстан)", coords: [55.79, 49.11], circle: null },
            "samara": { name: "Самара", coords: [53.20, 50.15], circle: null },
            "ufa": { name: "Уфа (Башкирия)", coords: [54.74, 55.97], circle: null },
            "perm": { name: "Пермь", coords: [58.01, 56.25], circle: null },
            "nn": { name: "Нижний Новгород", coords: [56.32, 44.00], circle: null },
            "saratov": { name: "Саратов", coords: [51.54, 46.03], circle: null }
        };

        // Рисуем стандартные круги радарных зон радиусом 55 км (в начале все зеленые)
        for (let key in sectors) {
            sectors[key].circle = L.circle(sectors[key].coords, {
                radius: 55000,
                color: '#2e7d32',
                fillColor: '#2e7d32',
                fillOpacity: 0.3,
                weight: 2
            }).addTo(map).bindPopup(`<b>Сектор: ${sectors[key].name}</b><br>Статус: Чисто`);
        }

        // Функция изменения цвета круга на любой кастомный
        function setStatusColor(hexColor, textStatus) {
            const currentKey = document.getElementById("city-select").value;
            const circle = sectors[currentKey].circle;
            
            circle.setStyle({
                color: hexColor === '#4a0002' ? '#ff1744' : hexColor, // Если ракетная тревога — делаем яркий контур
                fillColor: hexColor,
                fillOpacity: 0.5
            });
            
            circle.setPopupContent(`<b>Сектор: ${sectors[currentKey].name}</b><br>Статус: <b>${textStatus}</b>`);
        }

        // Отдельная логика для кнопки полного отбоя (возвращает стандартный зеленый)
        function applyStatus(status) {
            if (status === 'safe') {
                setStatusColor('#2e7d32', '🟢 Чисто');
                const currentKey = document.getElementById("city-select").value;
                sectors[currentKey].circle.setStyle({ fillOpacity: 0.3 });
            }
        }

        // Автоматическое плавное наведение камеры на выбранный город
        function focusCity() {
            const currentKey = document.getElementById("city-select").value;
            map.setView(sectors[currentKey].coords, 7);
        }

        // Сброс абсолютно всех секторов в зеленый цвет в один клик
        function resetAll() {
            for (let key in sectors) {
                sectors[key].circle.setStyle({
                    color: '#2e7d32',
                    fillColor: '#2e7d32',
                    fillOpacity: 0.3
                });
                sectors[key].circle.setPopupContent(`<b>Сектор: ${sectors[key].name}</b><br>Статус: Чисто`);
            }
        }
    </script>
</body>
</html>
