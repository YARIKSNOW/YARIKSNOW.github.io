<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Интерактивная карта тревог ПФО от @radarPF0</title>
    <!-- Подключаем официальный и неубиваемый движок Яндекс.Карт -->
    <script src="https://yandex.ru" type="text/javascript"></script>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; background-color: #121212; color: white; display: flex; height: 100vh; overflow: hidden; }
        
        /* Карта на весь экран */
        #map { flex: 1; height: 100%; z-index: 1; }
        
        /* Панель управления справа */
        .sidebar { width: 330px; background-color: #1a1a1a; border-left: 2px solid #2d2d2d; padding: 20px; display: flex; flex-direction: column; z-index: 10; box-shadow: -5px 0 15px rgba(0,0,0,0.5); box-sizing: border-box; }
        h1 { font-size: 16px; margin-top: 0; color: #00e5ff; border-bottom: 1px solid #2d2d2d; padding-bottom: 10px; text-align: center; font-weight: bold; }
        label { font-size: 11px; color: #aaa; margin-top: 10px; display: block; }
        select, button { width: 100%; padding: 11px; margin: 5px 0; font-size: 13px; font-weight: bold; border-radius: 6px; border: none; box-sizing: border-box; }
        select { background-color: #2d2d2d; color: white; border: 1px solid #3a3a3a; cursor: pointer; }
        button { cursor: pointer; transition: transform 0.1s; color: white; }
        button:active { transform: scale(0.98); }
        
        /* Цвета кнопок пульта */
        .btn-safe { background-color: #2e7d32; }
        .btn-attention { background-color: #fbc02d; color: black; }
        .btn-bpla { background-color: #ef6c00; }
        .btn-alarm { background-color: #c62828; }
        .btn-rocket { background-color: #4a0002; }
        .btn-clear { background-color: #37474f; border: 1px dashed #546e7a; margin-top: 10px; }
        
        p { font-size: 11px; color: #555; text-align: center; margin-top: auto; }
    </style>
</head>
<body>

    <!-- ЖИВАЯ КАРТА ЯНДЕКСА -->
    <div id="map"></div>

    <!-- БОКОВОЙ ПУЛЬТ -->
    <div class="sidebar">
        <h1>📡 МОНИТОР ПФО v5.0</h1>
        
        <label for="city-select">Выберите сектор контроля:</label>
        <select id="city-select" onchange="focusCity()">
            <option value="izhevsk">📍 Ижевск (Удмуртия)</option>
            <option value="kirov">📍 Киров (Кировская обл.)</option>
            <option value="kazan">📍 Казань (Татарстан)</option>
            <option value="samara">📍 Самара (Самарская обл.)</option>
            <option value="ufa">📍 Уфа (Башкирия)</option>
            <option value="perm">📍 Пермь (Пермский край)</option>
            <option value="nn">📍 Нижний Новгород</option>
            <option value="saratov">📍 Саратов (Саратовская обл.)</option>
        </select>

        <label>Установить статус на карте:</label>
        <button class="btn-safe" onclick="applyStatus('safe')">🟢 1. Полный отбой</button>
        <button class="btn-attention" onclick="applyStatus('attention')">🟡 2. Внимание по БпЛА</button>
        <button class="btn-bpla" onclick="applyStatus('bpla')">🟠 3. Опасность по БпЛА</button>
        <button class="btn-alarm" onclick="applyStatus('alarm')">🔴 4. Тревога по БпЛА</button>
        <button class="btn-rocket" onclick="applyStatus('rocket')">⚫ 5. РАКЕТНАЯ ОПАСНОСТЬ</button>
        
        <button class="btn-clear" onclick="resetAll()">🔄 Сбросить все сектора</button>
        
        <p>Карта тревог ПФО • Цель: информирование гражданских</p>
    </div>

    <script type="text/javascript">
        let myMap;
        
        // Сетка цветов для зон ПВО Яндекса
        const statusColors = {
            'safe': { fill: '#2e7d32', stroke: '#1b5e20', opacity: 0.2 },
            'attention': { fill: '#fbc02d', stroke: '#f57f17', opacity: 0.35 },
            'bpla': { fill: '#ef6c00', stroke: '#e65100', opacity: 0.45 },
            'alarm': { fill: '#c62828', stroke: '#b71c1c', opacity: 0.5 },
            'rocket': { fill: '#4a0002', stroke: '#ff1744', opacity: 0.6 }
        };

        // База данных координат секторов ПФО
        const sectors = {
            "izhevsk": { name: "Ижевск (Удмуртия)", coords: [56.85, 53.20], circle: null },
            "kirov": { name: "Киров", coords: [58.60, 49.66], circle: null },
            "kazan": { name: "Казань (Татарстан)", coords: [55.79, 49.11], circle: null },
            "samara": { name: "Самара", coords: [53.20, 50.15], circle: null },
            "ufa": { name: "Уфа (Башкирия)", coords: [54.74, 55.97], circle: null },
            "perm": { name: "Пермь", coords: [58.01, 56.25], circle: null },
            "nn": { name: "Нижний Новгород", coords: [56.32, 44.00], circle: null },
            "saratov": { name: "Саратов", coords: [51.54, 46.03], circle: null }
        };

        // Инициализация Яндекс Карт
        ymaps.ready(init);
        function init() {
            myMap = new ymaps.Map("map", {
                center: [56.85, 53.20], // Центрируем на Ижевск
                zoom: 6,
                controls: ['zoomControl', 'typeSelector']
            });

            // Включаем темный полупрозрачный слой поверх для тактического вида
            myMap.panes.get('ground').getElement().style.filter = 'brightness(40%) contrast(120%) saturate(80%)';

            // Рисуем круги радарных зон
            for (let key in sectors) {
                sectors[key].circle = new ymaps.Circle([sectors[key].coords, 50000], {
                    balloonContent: `<b>Сектор: ${sectors[key].name}</b><br>Статус: Чисто`
                }, {
                    fillColor: statusColors['safe'].fill,
                    strokeColor: statusColors['safe'].stroke,
                    fillOpacity: statusColors['safe'].opacity,
                    strokeWidth: 2
                });

                myMap.geoObjects.add(sectors[key].circle);
            }
        }

        // Логика кнопок смены статусов
        function applyStatus(status) {
            const currentKey = document.getElementById("city-select").value;
            const circle = sectors[currentKey].circle;
            const config = statusColors[status];
            
            circle.options.set({
                fillColor: config.fill,
                strokeColor: config.stroke,
                fillOpacity: config.opacity
            });

            let statusText = "🟢 Чисто";
            if (status === 'attention') statusText = "🟡 Внимание по БпЛА";
            if (status === 'bpla') statusText = "🟠 Опасность по БпЛА";
            if (status === 'alarm') statusText = "🔴 Тревога по БпЛА";
            if (status === 'rocket') statusText = "⚫ РАКЕТНАЯ ОПАСНОСТЬ";

            circle.properties.set('balloonContent', `<b>Сектор: ${sectors[currentKey].name}</b><br>Статус: <b>${statusText}</b>`);
        }

        // Автофокус камеры
        function focusCity() {
            const currentKey = document.getElementById("city-select").value;
            myMap.setCenter(sectors[currentKey].coords, 7, { checkZoomRange: true, duration: 300 });
        }

        // Сброс всей карты
        function resetAll() {
            for (let key in sectors) {
                sectors[key].circle.options.set({
                    fillColor: statusColors['safe'].fill,
                    strokeColor: statusColors['safe'].stroke,
                    fillOpacity: statusColors['safe'].opacity
                });
                sectors[key].circle.properties.set('balloonContent', `<b>Сектор: ${sectors[key].name}</b>`);
            }
        }
    </script>
</body>
</html>
