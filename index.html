<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радар ПФО — Мониторинг v6.4</title>
    
    <!-- Используем зеркальные стили, которые всегда доступны в РФ -->
    <link rel="stylesheet" href="https://cloudflare.com" />
    
    <style>
        html, body, #map {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0b0f19; /* Наш фирменный темный фон */
        }

        /* Наша тактическая шапка радара */
        .radar-header-main {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            color: #10b981;
            padding: 12px 25px;
            border: 2px solid #10b981;
            font-family: monospace;
            font-weight: bold;
            text-align: center;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }

        #status-display {
            margin-top: 5px;
            font-size: 14px;
            color: #fff;
            background: #1e293b;
            padding: 4px 10px;
            border-radius: 3px;
            display: inline-block;
        }

        /* Выезжающий пульт админа */
        .admin-panel-right {
            position: absolute;
            top: 15px;
            right: -320px;
            width: 260px;
            z-index: 1000;
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid #ef4444;
            padding: 15px;
            border-radius: 6px;
            color: #fff;
            font-family: monospace;
            transition: right 0.4s cubic-bezier(0.1, 0.9, 0.2, 1);
        }

        .admin-panel-right.active {
            right: 15px;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        .ctrl-btn {
            width: 100%;
            padding: 12px;
            margin: 6px 0;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-align: left;
        }

        .ctrl-btn:hover {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <div class="radar-header-main">
        ТАКТИЧЕСКИЙ РАДАР ПФО (@radarPF0)
        <div id="status-display">Статус: 🟢 Полный отбой</div>
    </div>

    <!-- Секретный пульт управления -->
    <div class="admin-panel-right" id="adminControl">
        <h3 style="color:#ef4444; margin-top:0; text-align:center;">ПУЛЬТ РАДАРА</h3>
        <button class="ctrl-btn" style="background:#10b981;" onclick="setRadarStatus('🟢 Полный отбой')">1. 🟢 Полный отбой</button>
        <button class="ctrl-btn" style="background:#f59e0b; color:#000;" onclick="setRadarStatus('🟡 Внимание по БпЛА')">2. 🟡 Внимание по БпЛА</button>
        <button class="ctrl-btn" style="background:#f97316;" onclick="setRadarStatus('🟠 Опасность по БпЛА')">3. 🟠 Опасность по БпЛА</button>
        <button class="ctrl-btn" style="background:#ef4444;" onclick="setRadarStatus('🔴 Тревога по БпЛА')">4. 🔴 Тревога по БпЛА</button>
        <button class="ctrl-btn" style="background:#450a0a; border:1px solid #ef4444;" onclick="setRadarStatus('⚫ РАКЕТНАЯ ОПАСНОСТЬ')">5. ⚫ РАКЕТНАЯ ОПАСНОСТЬ</button>
        <button class="ctrl-btn" style="background:#334155; text-align:center;" onclick="closeRemote()">Закрыть пульт</button>
    </div>

    <div id="map"></div>

    <!-- Зеркальный скрипт Leaflet из надежного источника -->
    <script src="https://cloudflare.com"></script>

    <script>
        // Инициализируем карту, наводим фокус прямо на Ижевск
        const map = L.map('map').setView([56.852, 53.204], 6);

        // ПОДКЛЮЧАЕМ НЕУБИВАЕМЫЕ СЕРВЕРА 2ГИС. Работает без токенов, ключей и блокировок в РФ!
        L.tileLayer('https://2gis.com{x}&y={y}&z={z}', {
            maxZoom: 18,
            attribution: '&copy; 2ГИС'
        }).addTo(map);

        // База наших 8 оборонительных узлов ПФО
        const pvoNodes = {
            "Ижевск": [56.852, 53.204],
            "Киров": [58.596, 49.654],
            "Казань": [55.788, 49.122],
            "Самара": [53.200, 50.150],
            "Уфа": [54.738, 55.972],
            "Пермь": [58.010, 56.250],
            "Нижний Новгород": [56.328, 44.002],
            "Саратов": [51.540, 46.008]
        };

        // Текстовая иконка антенны (не требует загрузки картинок)
        const textIcon = L.divIcon({
            html: `<div style="font-size: 22px; transform: translate(-30%, -30%);">📡</div>`,
            className: 'custom-radar-icon'
        });

        // Наносим сетку радаров на карту 2ГИС
        for (let city in pvoNodes) {
            L.marker(pvoNodes[city], {icon: textIcon}).addTo(map)
                .bindPopup(`<b>Узел связи: ${city}</b><br>Мониторинг активен.`);

            L.circle(pvoNodes[city], {
                color: '#10b981',
                fillColor: '#10b981',
                fillOpacity: 0.12,
                radius: 60000 // Радиус зоны контроля 60 км
            }).addTo(map);
        }

        // Секретный вызов админки по кнопке 'A' (англ) или 'Ф' (рус)
        document.addEventListener('keydown', function(event) {
            const code = event.key.toLowerCase();
            if (code === 'a' || code === 'ф') {
                const pass = prompt("ВВЕДИТЕ ТАКТИЧЕСКИЙ КОД ДОСТУПА:");
                if (pass === "2026") {
                    document.getElementById('adminControl').classList.add('active');
                } else if (pass !== null) {
                    alert("ДОСТУП ЗАБЛОКИРОВАН!");
                }
            }
        });

        function closeRemote() {
            document.getElementById('adminControl').classList.remove('active');
        }

        function setRadarStatus(statusText) {
            document.getElementById('status-display').innerText = `Статус: ${statusText}`;
        }
    </script>
</body>
</html>
