<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Радар ПФО — Мониторинг</title>
    <!-- Подключаем Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com" />
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
        }
        /* Стили карты */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* Шапка канала */
        .header-panel {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.85);
            border: 2px solid #3f3;
            color: #3f3;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            z-index: 1000;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
            pointer-events: none;
        }
        /* Индикатор текущего статуса */
        #status-indicator {
            margin-top: 5px;
            font-size: 14px;
            color: #fff;
            background: #222;
            padding: 3px 8px;
            border-radius: 3px;
            display: inline-block;
        }
        /* Скрытая админка (пульт управления) */
        .admin-panel {
            position: absolute;
            top: 20px;
            right: -320px; /* Изначально спрятана за экраном */
            width: 280px;
            background: rgba(15, 15, 15, 0.95);
            border: 2px solid #ff3333;
            border-radius: 8px;
            padding: 15px;
            color: #fff;
            z-index: 1000;
            transition: right 0.5s ease;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.4);
        }
        .admin-panel.active {
            right: 20px; /* Выезжает при вводе пароля */
        }
        .admin-panel h3 {
            margin-top: 0;
            color: #ff3333;
            text-align: center;
            border-bottom: 1px solid #444;
            padding-bottom: 8px;
        }
        .btn-status {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            font-size: 13px;
            text-align: left;
            transition: transform 0.1s;
        }
        .btn-status:hover {
            transform: scale(1.02);
            filter: brightness(1.2);
        }
        /* Цвета кнопок уровней опасности */
        .lvl-1 { background-color: #00875A; } /* Полный отбой */
        .lvl-2 { background-color: #FFAB00; color: #000; } /* Внимание по БпЛА */
        .lvl-3 { background-color: #FF5630; } /* Опасность по БпЛА */
        .lvl-4 { background-color: #DE350B; } /* Тревога по БпЛА */
        .lvl-5 { background-color: #520000; border: 1px solid #ff0000; } /* РАКЕТНАЯ ОПАСНОСТЬ */
        
        .close-btn {
            background: #333;
            color: #fff;
            border: none;
            width: 100%;
            padding: 5px;
            margin-top: 10px;
            cursor: pointer;
            border-radius: 4px;
        }
    </style>
</head>
<body>

    <div class="header-panel">
        ТАКТИЧЕСКИЙ РАДАР ПФО (@radarPF0)
        <div id="status-indicator">Статус: 🟢 Полный отбой</div>
    </div>

    <!-- Скрытый правый пульт -->
    <div class="admin-panel" id="adminPanel">
        <h3>ОБСТАНОВКА ПФО</h3>
        <button class="btn-status lvl-1" onclick="changeStatus('🟢 Полный отбой', '#00875a')">1. 🟢 Полный отбой</button>
        <button class="btn-status lvl-2" onclick="changeStatus('🟡 Внимание по БпЛА', '#FFAB00')">2. 🟡 Внимание по БпЛА</button>
        <button class="btn-status lvl-3" onclick="changeStatus('🟠 Опасность по БпЛА', '#FF5630')">3. 🟠 Опасность по БпЛА</button>
        <button class="btn-status lvl-4" onclick="changeStatus('🔴 Тревога по БпЛА', '#DE350B')">4. 🔴 Тревога по БпЛА</button>
        <button class="btn-status lvl-5" onclick="changeStatus('⚫ РАКЕТНАЯ ОПАСНОСТЬ', '#520000')">5. ⚫ РАКЕТНАЯ ОПАСНОСТЬ</button>
        <button class="close-btn" onclick="toggleAdminPanel(false)">Закрыть пульт</button>
    </div>

    <div id="map"></div>

    <!-- Подключаем Leaflet JS -->
    <script href="https://unpkg.com"></script>
    <script>
        // Инициализируем карту с центром в ПФО (примерно Самара/Казань)
        const map = L.map('map').setView([55.0, 52.0], 6);

        // Ставим топовую бесплатную темную тему, которая не лагает в РФ
        L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        // Координаты наших 8 тактических узлов ПВО
        const cities = {
            "Ижевск": [56.852, 53.204],
            "Киров": [58.596, 49.654],
            "Казань": [55.788, 49.122],
            "Самара": [53.200, 50.150],
            "Уфа": [54.738, 55.972],
            "Пермь": [58.010, 56.250],
            "Нижний Новгород": [56.328, 44.002],
            "Саратов": [51.540, 46.008]
        };

        // Отрисовка зон ПВО радиусом 60 км (60000 метров)
        for (let city in cities) {
            // Ставим маркер города
            L.marker(cities[city]).addTo(map)
                .bindPopup(`<b>${city}</b><br>Узел мониторинга ПВО`);

            // Рисуем тактический круг защиты
            L.circle(cities[city], {
                color: '#33ff33',
                fillColor: '#33ff33',
                fillOpacity: 0.08,
                radius: 60000 // 60 км
            }).addTo(map);
        }

        // Логика секретной админки по кнопке 'A' (английская) или 'Ф' (русская)
        document.addEventListener('keydown', function(event) {
            if (event.key === 'a' || event.key === 'A' || event.key === 'ф' || event.key === 'Ф') {
                const password = prompt("Введи тактический код доступа:");
                if (password === "200266") {
                    toggleAdminPanel(true);
                } else if (password !== null) {
                    alert("Доступ запрещен! Код неверный.");
                }
            }
        });

        function toggleAdminPanel(show) {
            const panel = document.getElementById('adminPanel');
            if (show) {
                panel.classList.add('active');
            } else {
                panel.classList.remove('active');
            }
        }

        // Функция смены статусов на пульте
        function changeStatus(statusText, color) {
            const indicator = document.getElementById('status-indicator');
            indicator.innerText = `Статус: ${statusText}`;
            
            // Если включена ракетная опасность, подсветим рамку индикатора тревожным цветом
            if(statusText.includes('РАКЕТНАЯ')) {
                indicator.style.border = "1px solid red";
                indicator.style.background = "#200";
            } else {
                indicator.style.border = "none";
                indicator.style.background = "#222";
            }
        }
    </script>
</body>
</html>
