<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Радар ПФО — Мониторинг v12.0</title>

<!-- ПОДКЛЮЧАЕМ СТИЛИ LEAFLET КАК У НИХ -->
<link rel="stylesheet" href="https://cloudflare.com" />

<style>
/* 1. ИНТЕРФЕЙС И КАРТА */
html, body, #map {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background-color: #b4d6e4;
}
/* 2. НАША НЕОНОВАЯ ШАПКА */
.top-radar-bar {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: rgba(15, 23, 42, 0.95);
  color: #3f3;
  padding: 10px 25px;
  border: 2px solid #10b981;
  border-radius: 6px;
  text-align: center;
  font-family: monospace;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(16,185,129,0.3);
}
/* 3. НАША ВЫЕЗЖАЮЩАЯ ПАНЕЛЬКА */
.admin-sidebar {
  position: absolute;
  top: 15px;
  right: -320px;
  width: 250px;
  z-index: 1000;
  background: rgba(15, 23, 42, 0.98);
  border: 2px solid #ef4444;
  padding: 15px;
  color: #fff;
  font-family: monospace;
  border-radius: 6px;
  transition: right 0.4s ease;
}
.admin-sidebar.open {
  right: 15px;
  box-shadow: 0 0 20px rgba(239,68,68,0.5);
}
.panel-btn {
  width: 100%;
  padding: 11px;
  margin: 5px 0;
  border: none;
  border-radius: 4px;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: left;
}
.panel-btn:hover {
  filter: brightness(1.2);
}
</style>
</head>
<body>

<!-- ВЕРХНЯЯ ШАПКА РАДАРА -->
<div class="top-radar-bar">
  Карта тревог ПФО от @radarPF0, цель - информирование гражданских
  <div id="global-status" style="margin-top:5px; background:#1e293b; padding:2px 6px; border-radius:3px; color:#fff; font-size:12px;">Статус: 🟢 Отбой</div>
</div>

<!-- НАШ СЕКРЕТНЫЙ ПУЛЬТ -->
<div class="admin-sidebar" id="adm">
  <h3 style="color:#ef4444; margin:0 0 10px 0; text-align:center;">ЦУП РАДАРА</h3>
  <div id="active-reg-title" style="color:#38bdf8; margin-bottom:10px; font-weight:bold;">Регион: Не выбран</div>
  <button class="panel-btn" style="background:#10b981;" onclick="applyLvl('1')">1. 🟢 Отбой</button>
  <button class="panel-btn" style="background:#f59e0b; color:#000;" onclick="applyLvl('2')">2. 🟡 Внимание</button>
  <button class="panel-btn" style="background:#f97316;" onclick="applyLvl('3')">3. 🟠 Опасность</button>
  <button class="panel-btn" style="background:#ef4444;" onclick="applyLvl('4')">4. 🔴 Тревога</button>
  <button class="panel-btn" style="background:#450a0a; border:1px solid #ef4444;" onclick="applyLvl('5')">5. ⚫ РАКЕТА</button>
  <button class="panel-btn" style="background:#334155; text-align:center;" onclick="document.getElementById('adm').classList.remove('open')">Скрыть пульт</button>
</div>

<!-- КОНТЕЙНЕР КАРТЫ -->
<div id="map"></div>

<!-- ОФИЦИАЛЬНЫЙ ДВИЖОК LEAFLET БЕЗ РАЗРЫВОВ И СТРОК -->
<script src="https://cloudflare.com"></script>

<script>
// ==========================================
// НАСТРОЙКИ СВЯЗИ С ТГ (ВВОДИ ДАННЫЕ СЮДА!)
// ==========================================
var TG_TOKEN = "8859581232:AAGkjMUvgZsr8hPm0euY4oOCPDzWYzkz5G0";
var ADMIN_CHAT_ID = "5307958804";
// ==========================================

var curRegName = "";
var curLayer = null;
var activeLayers = {};

// Запуск карты с видом на Поволжье (Ижевск по центру)
var map = L.map('map', {zoomControl: false}).setView([56.852, 53.204], 5);

// КЛАССИЧЕСКИЙ СЛОЙ OPENSTREETMAP КАК НА ИХ СКРИНЕ
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var lvls = {
  "1": { color: "#eaeaea", text: "🟢 Отбой" },
  "2": { color: "#ffcc00", text: "🟡 Внимание по БпЛА" },
  "3": { color: "#ff9900", text: "🟠 Опасность по БпЛА" },
  "4": { color: "#cc0000", text: "🔴 Тревога по БпЛА" },
  "5": { color: "#4a0000", text: "⚫ РАКЕТНАЯ ОПАСНОСТЬ" }
};

// ТАКТИЧЕСКИЙ МАНЕВР: Подгружаем реальные точные границы регионов РФ (GeoJSON)
fetch("https://githubusercontent.com")
  .then(res => res.json())
  .then(geoData => {
    L.geoJSON(geoData, {
      style: function() {
        return {
          color: "#555555",
          fillColor: "#eaeaea", // Исходный серый цвет, как на скрине
          fillOpacity: 0.6,
          weight: 1.5
        };
      },
      onEachFeature: function(feature, layer) {
        var name = feature.properties.name;
        activeLayers[name] = layer;
        
        // Клик по любому региону на карте России
        layer.on('click', function() {
          var pass = prompt("ЦУП РАДАРА\nВведите тактический код для сектора: " + name);
          if (pass === "2026") {
            curRegName = name;
            curLayer = layer;
            document.getElementById('active-reg-title').innerText = "Регион: " + name;
            document.getElementById('adm').classList.add('open');
          }
        });
      }
    }).addTo(map);
  }).catch(err => console.log("Ошибка загрузки базы GeoJSON"));

// Применение сигнала тревоги
function applyLvl(num) {
  var selected = lvls[num];
  if (curLayer) {
    curLayer.setStyle({
      fillColor: selected.color,
      fillOpacity: num === "1" ? 0.6 : 0.85
    });
  }
  document.getElementById('global-status').innerText = curRegName + ": " + selected.text;
  
  // Отправка в ТГ
  var msg = "🚨 ОБСТАНОВКА ПФО\nРегион: " + curRegName + "\nСтатус: " + selected.text;
  var url = "https://telegram.org" + TG_TOKEN + "/sendMessage?chat_id=" + ADMIN_CHAT_ID + "&text=" + encodeURIComponent(msg);
  fetch(url).catch(e => console.log("ТГ-оповещение активно"));
  
  document.getElementById('adm').classList.remove('open');
}

// Резервный показ пульта кнопками A или Ф
document.addEventListener('keydown', function(e) {
  var k = e.key.toLowerCase();
  if (k === 'a' || k === 'ф') {
    var p = prompt("КОД АДМИНА:");
    if (p === "2026") { document.getElementById('adm').classList.add('open'); }
  }
});
</script>
</body>
</html>
