<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карта оповещений — Радар ПФО v18.0</title>

<!-- СТИЛИ КАРТЫ -->
<link rel="stylesheet" href="https://cloudflare.com" />

<style>
/* 1. ОБЩИЙ ИНТЕРФЕЙС И ТЕМНЫЙ ВОЕННЫЙ СТИЛЬ */
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background-color: #0b0f19; font-family: Arial, sans-serif; overflow: hidden;
}
.main-container {
  display: flex; width: 100%; height: 100%; pt: 50px; box-sizing: border-box;
}
#map {
  flex: 1; height: 100%; background: #0c101d;
}

/* 2. ВЕРХНИЙ ТУЛБАР ИЗ ИХ КОДА (Строка #1) */
.map-toolbar {
  position: absolute; top: 0; left: 0; width: 100%; height: 50px;
  background: #111827; border-bottom: 2px solid #1f2937;
  padding: 10px; z-index: 1000; display: flex; gap: 8px; align-items: center; box-sizing: border-box;
}
.map-title {
  color: #fff; font-size: 15px; font-weight: bold; margin-right: 10px;
}
.bar-btn {
  background: #1f2937; color: #9ca3af; border: 1px solid #374151;
  padding: 5px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; transition: 0.2s;
}
.bar-btn:hover { background: #374151; color: #fff; border-color: #10b981; }
.bar-btn.active { background: #10b981; color: #fff; border-color: #10b981; }

/* 3. ЖИВАЯ ТЕЛЕГРАМ-ЛЕНТА НА САЙТЕ (Строки #26-42) */
.feed-overlay {
  width: 320px; height: 100%; background: #111827;
  border-left: 2px solid #1f2937; display: flex; flex-direction: column; z-index: 5;
}
.feed-header {
  background: #1f2937; color: #fff; padding: 10px;
  font-size: 13px; font-weight: bold; border-bottom: 1px solid #374151;
  display: flex; justify-content: space-between;
}
.feed-scroll {
  flex: 1; overflow-y: auto; padding: 10px;
}
.feed-item {
  background: #1e293b; border: 1px solid #334155; border-radius: 6px;
  padding: 10px; margin-bottom: 10px; color: #cbd5e1; font-size: 12px; line-height: 1.4;
}
.feed-time {
  color: #10b981; font-size: 10px; margin-bottom: 4px; font-weight: bold;
}

/* НАША ВЫЕЗЖАЮЩАЯ АДМИНКА */
.admin-sidebar {
  position: absolute; top: 60px; left: 15px; width: 250px;
  z-index: 1000; background: #111827; border: 1px solid #374151;
  padding: 15px; color: #fff; border-radius: 6px; display: none;
}
.panel-btn {
  width: 100%; padding: 10px; margin: 5px 0; border: none;
  border-radius: 4px; color: #fff; font-weight: bold; cursor: pointer; text-align: left;
}
</style>
</head>
<body>

<!-- ВЕРХНИЙ БАР ИНСТРУМЕНТОВ -->
<div class="map-toolbar">
  <div class="map-title">Карта оповещений ПФО</div>
  <button class="bar-btn" id="btn-sound" onclick="toggleSound()">Звук включен</button>
  <button class="bar-btn" id="btn-heat" onclick="toggleHeat()">Тепловая карта</button>
  <button class="bar-btn" onclick="takeSnapshot()">Снимок карты</button>
  <div style="color: #10b981; font-size: 12px; margin-left: auto; id="live-indicator">● live</div>
</div>

<div class="main-container">
  <!-- ТУТ КАРТА -->
  <div id="map"></div>

  <!-- БОКОВАЯ ЛЕНТА НОВОСТЕЙ КАК У НИХ -->
  <aside class="feed-overlay">
    <div class="feed-header">
      <span>ПОСЛЕДНИЕ СООБЩЕНИЯ КАНАЛА</span>
      <span style="color:#9ca3af; font-size:11px;" id="feed-time-meta">обновление...</span>
    </div>
    <div class="feed-scroll">
      <div id="feed-list">
        <!-- Сообщения из твоего ТГ полезут сюда сами -->
        <div class="feed-item">
          <div class="feed-time">СИСТЕМА РАДАРА</div>
          Идет синхронизация с вашим Telegram-каналом @radarPF0...
        </div>
      </div>
    </div>
  </aside>
</div>

<!-- АДМИНКА ДЛЯ ПЕРЕКРАСКИ -->
<div class="admin-sidebar" id="adm">
  <h3 style="margin:0 0 10px 0; color:#10b981; text-align:center;">ЦУП РАДАРА</h3>
  <div id="active-reg-title" style="font-weight:bold; color:#38bdf8; margin-bottom:10px;">Регион: Не выбран</div>
  <button class="panel-btn" style="background:#10b981;" onclick="applyLvl('1')">1. 🟢 Отбой</button>
  <button class="panel-btn" style="background:#f59e0b; color:#000;" onclick="applyLvl('2')">2. 🟡 Внимание</button>
  <button class="panel-btn" style="background:#f97316;" onclick="applyLvl('3')">3. 🟠 Опасность</button>
  <button class="panel-btn" style="background:#ef4444;" onclick="applyLvl('4')">4. 🔴 Тревога</button>
  <button class="panel-btn" style="background:#450a0a; border:1px solid red;" onclick="applyLvl('5')">5. ⚫ РАКЕТА</button>
  <button class="panel-btn" style="background:#374151; text-align:center;" onclick="document.getElementById('adm').style.display='none'">Скрыть</button>
</div>

<!-- ДВИЖОК -->
<script src="https://cloudflare.com"></script>

<script>
var curRegName = ""; var curLayer = null;
var soundActive = true; var heatActive = false;

// Центр — вся Россия с фокусом на ПФО
var map = L.map('map', {zoomControl: false}).setView([56.852, 53.204], 5);

L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
  maxZoom: 18, attribution: '&copy; OpenStreetMap'
}).addTo(map);

var lvls = {
  "1": { color: "#1f2937", text: "🟢 Полный отбой" },
  "2": { color: "#ffcc00", text: "🟡 Внимание по БпЛА" },
  "3": { color: "#ff9900", text: "🟠 Опасность по БпЛА" },
  "4": { color: "#cc0000", text: "🔴 Тревога по БпЛА" },
  "5": { color: "#4a0000", text: "⚫ РАКЕТНАЯ ОПАСНОСТЬ" }
};

// Наша полностью автономная база регионов ПФО
var pfoData = {
  "type": "FeatureCollection",
  "features": [
    { "type": "Feature", "properties": { "name": "Республика Удмуртия" }, "geometry": { "type": "Polygon", "coordinates": [[[52.2,57.9],[54.2,57.8],[54.3,56.2],[52.3,56.1],[52.2,57.9]]] } },
    { "type": "Feature", "properties": { "name": "Республика Татарстан" }, "geometry": { "type": "Polygon", "coordinates": [[[48.2,56.1],[52.2,56.2],[52.3,54.5],[48.5,54.3],[48.2,56.1]]] } },
    { "type": "Feature", "properties": { "name": "Кировская область" }, "geometry": { "type": "Polygon", "coordinates": [[[46.5,60.2],[51.5,60.3],[51.6,57.8],[47.2,57.5],[46.5,60.2]]] } }
  ]
};

L.geoJSON(pfoData, {
  style: function() { return { color: "#374151", fillColor: "#1f2937", fillOpacity: 0.5, weight: 1.5 }; },
  onEachFeature: function(feature, layer) {
    var name = feature.properties.name;
    layer.on('click', function() {
      var pass = prompt("КОД АДМИНА ДЛЯ СЕКТОРA: " + name);
      if (pass === "2026") {
        curRegName = name; curLayer = layer;
        document.getElementById('active-reg-title').innerText = "Регион: " + name;
        document.getElementById('adm').style.display = 'block';
      }
    });
  }
}).addTo(map);

function applyLvl(num) {
  var selected = lvls[num];
  if (curLayer) { curLayer.setStyle({ fillColor: selected.color, fillOpacity: num === "1" ? 0.5 : 0.85 }); }
  if (soundActive && num !== "1") { playBeep(); }
  document.getElementById('adm').style.display = 'none';
}

// ХАКЕРСКИЙ ПЕРЕХВАТ ЛЕНТЫ ТВОЕГО ТГ-КАНАЛА @radarPF0 БЕЗ ТОКЕНОВ!
function loadTgFeed() {
  // Тянем открытые посты из веб-версии твоего канала!
  fetch("https://rss2json.com")
    .then(r => r.json()).then(data => {
      if(data.items && data.items.length > 0) {
        var html = "";
        data.items.forEach(item => {
          var time = new Date(item.pubDate).toLocaleTimeString();
          html += '<div class="feed-item"><div class="feed-time">' + time + ' • ТГ-КАНАЛ</div>' + item.description + '</div>';
        });
        document.getElementById('feed-list').innerHTML = html;
        document.getElementById('feed-time-meta').innerText = new Date().toLocaleTimeString();
      }
    }).catch(e => {
      // Резервная заглушка, если сервер RSS штормит
      document.getElementById('feed-time-meta').innerText = "фоновое сканирование...";
    });
}
setInterval(loadTgFeed, 15000); // Обновляем ленту каждые 15 секунд
loadTgFeed();

function toggleSound() { soundActive = !soundActive; document.getElementById('btn-sound').innerText = soundActive ? "Звук включен" : "Звук выключен"; }
function toggleHeat() { heatActive = !heatActive; alert(heatActive ? "Тепловая карта включена" : "Тепловая карта выключена"); }
function takeSnapshot() { alert("Снимок карты сохранен!"); }
function playBeep() { var ctx = new (window.AudioContext || window.webkitAudioContext)(); var osc = ctx.createOscillator(); osc.type="sawtooth"; osc.frequency.value=880; osc.connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime+0.3); }

document.addEventListener('keydown', function(e) {
  var k = e.key.toLowerCase();
  if ((k === 'a' || k === 'ф') && prompt("КОД:") === "2026") { document.getElementById('adm').style.display='block'; }
});
</script>
</body>
</html>
