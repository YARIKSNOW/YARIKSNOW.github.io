<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Радар ПФО — Мониторинг v11.0</title>

<!-- ОФИЦИАЛЬНЫЕ СТИЛИ LEAFLET (КАК У НИХ) -->
<link rel="stylesheet" href="https://cloudflare.com" />

<style>
/* 1. НАСТРОЙКА ТАКТИЧЕСКОГО ЭКРАНА */
html, body, #map {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background-color: #b4d6e4; /* Цвет океана, если тайлы грузятся */
}
/* 2. НАША НЕОНОВАЯ ШАПКА */
.top-radar-header {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: rgba(10, 16, 36, 0.9);
  color: #3f3;
  padding: 10px 25px;
  border: 2px solid #10b981;
  border-radius: 6px;
  text-align: center;
  font-family: monospace;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(16,185,129,0.3);
}
/* 3. НАША СЕКРЕТНАЯ ПАНЕЛЬКА УПРАВЛЕНИЯ */
.admin-sidebar {
  position: absolute;
  top: 15px;
  right: -320px;
  width: 250px;
  z-index: 1000;
  background: rgba(10, 16, 36, 0.95);
  border: 2px solid #ef4444;
  padding: 15px;
  color: #fff;
  font-family: monospace;
  border-radius: 6px;
  transition: right 0.4s ease;
}
.admin-sidebar.open {
  right: 15px;
  box-shadow: 0 0 20px rgba(239,68,68,0.4);
}
.menu-btn {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 4px;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: left;
}
.menu-btn:hover {
  filter: brightness(1.2);
}
</style>
</head>
<body>

<!-- ВЕРХНЯЯ ШАПКА РАДАРА -->
<div class="top-radar-header">
  Карта тревог ПФО от @radarPF0, цель - информирование гражданских
  <div id="global-status" style="margin-top:5px; background:#1e293b; padding:2px 6px; border-radius:3px; color:#fff; font-size:12px;">Статус: 🟢 Отбой</div>
</div>

<!-- БОКОВОЙ ПУЛЬТ АДМИНА -->
<div class="admin-sidebar" id="adm">
  <h3 style="color:#ef4444; margin:0 0 10px 0; text-align:center;">ПУЛЬТ РАДАРА</h3>
  <div id="active-reg-title" style="color:#38bdf8; margin-bottom:10px; font-weight:bold;">Регион: Не выбран</div>
  <button class="menu-btn" style="background:#10b981;" onclick="applyLvl('1')">1. 🟢 Отбой</button>
  <button class="menu-btn" style="background:#f59e0b; color:#000;" onclick="applyLvl('2')">2. 🟡 Внимание</button>
  <button class="menu-btn" style="background:#f97316;" onclick="applyLvl('3')">3. 🟠 Опасность</button>
  <button class="menu-btn" style="background:#ef4444;" onclick="applyLvl('4')">4. 🔴 Тревога</button>
  <button class="menu-btn" style="background:#450a0a; border:1px solid #ef4444;" onclick="applyLvl('5')">5. ⚫ РАКЕТА</button>
  <button class="menu-btn" style="background:#334155; text-align:center;" onclick="document.getElementById('adm').classList.remove('open')">Скрыть пульт</button>
</div>

<!-- КОНТЕЙНЕР ДЛЯ ЖИВОЙ КАРТЫ -->
<div id="map"></div>

<!-- ОФИЦИАЛЬНЫЙ ДВИЖОК LEAFLET -->
<script src="https://cloudflare.com"></script>

"></script>

<script>
// ТАКТИЧЕСКИЕ НАСТРОЙКИ СВЯЗИ ТГ (ВСТАВЛЯЙ СВОИ)
var TG_TOKEN = "8859581232:AAGB90jqhXYJlyaD2wfDGxnqd18VOGeRbyk";
var ADMIN_CHAT_ID = "5307988804";

var curRegName = "";
var curLayer = null;
var activeLayers = {};

// Запуск карты с видом на Поволжье (Ижевск по центру)
var map = L.map('map', {zoomControl: false}).setView([56.852, 53.204], 6);

// КЛАССИЧЕСКИЙ СЛОЙ OPENSTREETMAP (КАК НА ИХ СКРИНШОТЕ)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

var lvls = {
  "1": { color: "#eaeaea", text: "🟢 Отбой" },                  // Серый цвет покоя
  "2": { color: "#ffcc00", text: "🟡 Внимание по БпЛА" },        // Желтый
  "3": { color: "#ff9900", text: "🟠 Опасность по БпЛА" },       // Оранжевый
  "4": { color: "#cc0000", text: "🔴 Тревога по БпЛА" },         // Красный
  "5": { color: "#4a0000", text: "⚫ РАКЕТНАЯ ОПАСНОСТЬ" }       // Темно-красный
};

// МАС СЛИТНЫХ ВЕКТОРНЫХ РЕГИОНОВ ПФО (КАК У RADARYRAL)
var regionsData = {
  "Республика Удмуртия": [[57.9,52.2], [57.8,54.2], [56.2,54.3], [56.1,52.3]],
  "Кировская область": [[60.2,46.5], [60.3,51.5], [57.8,51.6], [57.5,47.2]],
  "Республика Татарстан": [[56.1,47.5], [56.2,52.2], [54.5,52.3], [54.3,48.2]],
  "Республика Башкортостан": [[56.2,54.3], [56.1,59.8], [51.8,58.8], [52.1,53.2]],
  "Пермский край": [[61.5,53.5], [61.2,59.5], [56.2,58.8], [56.5,54.2]],
  "Нижегородская область": [[57.5,42.5], [57.6,46.5], [54.8,46.2], [54.5,42.1]],
  "Самарская область": [[54.5,48.2], [54.6,52.1], [52.1,51.8], [52.2,47.9]],
  "Оренбургская область": [[52.2,50.8], [52.1,62.5], [50.5,60.8], [51.1,53.8]],
  "Саратовская область": [[52.8,44.8], [52.9,50.8], [50.2,49.5], [49.8,45.2]]
};

// Рисуем состыкованные векторные регионы поверх карты
for (var name in regionsData) {
  var polygon = L.polygon(regionsData[name], {
    color: "#555555",
    fillColor: "#eaeaea", // Исходный серый цвет, как на скрине!
    fillOpacity: 0.6,
    weight: 1.5
  }).addTo(map);

  activeLayers[name] = polygon;

  // Привязываем клик для вызова пульта
  setupRegionClick(polygon, name);
}

function setupRegionClick(poly, name) {
  poly.on('click', function() {
    var pass = prompt("ЦУП РАДАРА\nВведите тактический код для сектора: " + name);
    if (pass === "2026") {
      curRegName = name;
      curLayer = poly;
      document.getElementById('active-reg-title').innerText = "Регион: " + name;
      document.getElementById('adm').classList.add('open'); // Пульт выезжает
    }
  });
}

// Применение сигнала тревоги к региону
function applyLvl(num) {
  var selected = lvls[num];
  
  if (curLayer) {
    curLayer.setStyle({
      fillColor: selected.color,
      fillOpacity: num === "1" ? 0.6 : 0.85
    });
  }
  
  document.getElementById('global-status').innerText = curRegName + ": " + selected.text;
  
  // Отправка в ТГ-бота
  var msg = "🚨 ОБСТАНОВКА ПФО\nРегион: " + curRegName + "\nСтатус: " + selected.text;
  var url = "https://telegram.org" + TG_TOKEN + "/sendMessage?chat_id=" + ADMIN_CHAT_ID + "&text=" + encodeURIComponent(msg);
  fetch(url).catch(e => console.log("ТГ-оповещение активно, оке"));
  
  document.getElementById('adm').classList.remove('open');
}

// Вызов панели кнопками A / Ф
document.addEventListener('keydown', function(e) {
  var k = e.key.toLowerCase();
  if (k === 'a' || k === 'ф') {
    var p = prompt("КОД АДМИНА:");
    if (p === "2026") { document.getElementById('adm').classList.add('open'); }
  }
});
</script>
</body>
</html>
