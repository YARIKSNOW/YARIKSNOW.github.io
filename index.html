<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Радар ПФО — ЦУП v20.0</title>

<!-- НАДЕЖНЫЕ СТИЛИ КАРТЫ -->
<link rel="stylesheet" href="https://cloudflare.com" />

<style>
html, body, #map {
  margin: 0; padding: 0; width: 100%; height: 100%;
  background: #060913; font-family: 'Segoe UI', sans-serif; overflow: hidden;
}

/* КРАСИВЫЕ МСК-ЧАСЫ В ПРАВОМ ВЕРХНЕМ УГЛУ */
.clock-panel {
  position: absolute; top: 20px; right: 20px; z-index: 1000;
  background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
  padding: 10px 16px; border-radius: 10px; text-align: right; color: #fff;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5); min-width: 130px;
}
.time-main { font-size: 22px; font-weight: bold; font-family: monospace; }
.date-main { font-size: 11px; color: #10b981; text-transform: uppercase; margin-top: 2px; font-weight: bold; }

/* ВЫЕЗЖАЮЩАЯ ПЛАШКА СИГНАЛОВ СЛЕВА СНИЗУ */
.legend-wrapper {
  position: absolute; bottom: 20px; left: -190px; z-index: 1000;
  display: flex; align-items: flex-end; transition: left 0.3s ease;
}
.legend-wrapper.open { left: 20px; }

.legend-content {
  background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
  padding: 12px; border-radius: 10px; color: #fff; font-size: 12px;
  display: flex; flex-direction: column; gap: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);
}
.legend-item { display: flex; align-items: center; gap: 8px; }
.legend-color { width: 22px; height: 12px; border-radius: 3px; }

/* СТИЛЬНАЯ КНОПКА-СТРЕЛОЧКА */
.toggle-arrow-btn {
  background: rgba(15, 23, 42, 0.9); border: 1px solid rgba(255,255,255,0.1);
  color: #10b981; width: 30px; height: 40px; cursor: pointer;
  border-radius: 0 8px 8px 0; display: flex; align-items: center;
  justify-content: center; font-weight: bold; font-size: 16px; box-shadow: 4px 0 10px rgba(0,0,0,0.2);
}

/* СТИЛЬ ОКНА POPUP НА КАРТЕ */
.leaflet-popup-content-wrapper {
  background: #111827 !important; color: #fff !important; border-radius: 8px !important;
}
.leaflet-popup-tip { background: #111827 !important; }
</style>
</head>
<body>

<!-- ТОЛЬКО ВРЕМЯ И ДАТА -->
<div class="clock-panel">
  <div class="time-main" id="liveTime">00:00:00</div>
  <div class="date-main" id="liveDate">ЗАГРУЗКА...</div>
</div>

<!-- ВЫДВИЖНАЯ ХЕРЬ СЛЕВА СНИЗУ ПО СТРЕЛОЧКЕ -->
<div class="legend-wrapper" id="legendBlock">
  <div class="legend-content">
    <div class="legend-item"><div class="legend-color" style="background:#6c757d;"></div><span>Отбой / Спокойно</span></div>
    <div class="legend-item"><div class="legend-color" style="background:#ffc107;"></div><span>Опасность БпЛА</span></div>
    <div class="legend-item"><div class="legend-color" style="background:#dc3545;"></div><span>Ракетная опасность</span></div>
  </div>
  <button class="toggle-arrow-btn" onclick="document.getElementById('legendBlock').classList.toggle('open')">❯</button>
</div>

<div id="map"></div>
  
<!-- ОФИЦИАЛЬНЫЙ ДВИЖОК LEAFLET -->
<script src="https://cloudflare.com"></script>

<script>
// ЗАПУСК КАРТЫ С ВИДОМ НА ВСЮ РОССИЮ И МИР (КАК ТЫ ХОТЕЛ!)
const map = L.map('map', { zoomControl: false }).setView([58.0, 70.0], 3.5);

// КРАСИВАЯ ЖИВАЯ ТЁМНАЯ КАРТА (РАБОТАЕТ БЕЗ БЛОКИРОВОК)
L.tileLayer('https://{s}://{z}/{x}/{y}{r}.png', {
  maxZoom: 18,
  attribution: '&copy; OpenStreetMap'
}).addTo(map);

// ТОЧНЫЕ ЧАСЫ ПО МСК С СЕКУНДАМИ
function updateClock() {
  const now = new Date();
  const msk = new Date(now.toLocaleString("en-US", {timeZone: "Europe/Moscow"}));
  const days = ['воскресенье','понедельник','вторник','среда','четверг','пятница','суббота'];
  const months = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
  
  const h = String(msk.getHours()).padStart(2, '0');
  const m = String(msk.getMinutes()).padStart(2, '0');
  const s = String(msk.getSeconds()).padStart(2, '0');
  
  document.getElementById('liveTime').innerText = h + ':' + m + ':' + s;
  document.getElementById('liveDate').innerText = days[msk.getDay()] + ', ' + msk.getDate() + ' ' + months[msk.getMonth()];
}
setInterval(updateClock, 1000);
updateClock();
</script>
