<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Радар ПФО — ЦУП v8.0</title>
<style>
/* 1. БАЗОВЫЙ ИНТЕРФЕЙС И ТАКТИЧЕСКИЙ ФОН */
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background-color: #04060f;
  /* Красивая сетка военного радара на фоне */
  background-image: 
    linear-gradient(rgba(0,255,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,0,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  font-family: 'Courier New', monospace;
  overflow: hidden;
}
/* 2. ОФОРМЛЕНИЕ ШАПКИ */
.radar-top-panel {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  background: rgba(6, 10, 26, 0.95);
  color: #3f3;
  padding: 12px 30px;
  border: 2px solid #10b981;
  border-radius: 6px;
  text-align: center;
  box-shadow: 0 0 20px rgba(16,185,129,0.3);
}
/* 3. КАРТА И РЕГИОНЫ */
svg {
  width: 100%;
  height: 100%;
}
.reg-shape {
  fill: #0b132b;
  stroke: #1c2541;
  stroke-width: 2;
  cursor: pointer;
  transition: all 0.3s;
}
.reg-shape:hover {
  fill: #1c2541;
  stroke: #33ff33;
  filter: drop-shadow(0px 0px 8px #33ff33);
}
.reg-label {
  fill: #5c677d;
  font-size: 11px;
  font-weight: bold;
  pointer-events: none;
}
/* 4. СИСТЕМЫ ПВО */
.pvo-range {
  fill: none;
  stroke-width: 1.5;
  stroke-dasharray: 5 4;
  transition: stroke 0.5s;
}
.city-dot {
  stroke: #fff;
  stroke-width: 1.5;
}
.city-text {
  font-size: 12px;
  font-weight: bold;
  fill: #fff;
}
</style>
</head>
<body>

<!-- ВЕРХНЯЯ ИНФО-ПАНЕЛЬ -->
<div class="radar-top-panel">
  СИТУАЦИОННЫЙ ЦЕНТР «РАДАР ПФО» (@radarPF0)
  <div style="font-size:12px; color:#94a3b8; margin-top:4px;">Кликни на регион для управления сигналами (Доступ по паролю)</div>
</div>

<!-- ЛОГИКА СИТУАЦИОННОГО ЦЕНТРА -->
<script>
// Таблица цветов для уровней опасности
var lvls = {
  "1": { color: "#10b981", text: "🟢 Полный отбой" },
  "2": { color: "#f59e0b", text: "🟡 Внимание по БпЛА" },
  "3": { color: "#f97316", text: "🟠 Опасность по БпЛА" },
  "4": { color: "#ef4444", text: "🔴 Тревога по БпЛА" },
  "5": { color: "#450a0a", text: "⚫ РАКЕТНАЯ ОПАСНОСТЬ", border: "#ef4444" }
};

// Главная функция клика по региону
function manageRegion(regName, zoneId, shapeId) {
  // Запрос секретного пароля Ярика
  var pass = prompt("ВХОД В АДМИНКУ.\nВведите тактический код для изменения статуса в: " + regName);
  
  if (pass === "2026") {
    var num = prompt(
      "ВЫБЕРИТЕ УРОВЕНЬ ОПАСНОСТИ ДЛЯ [" + regName.toUpperCase() + "]:\n\n" +
      "1 - 🟢 Полный отбой\n" +
      "2 - 🟡 Внимание по БпЛА\n" +
      "3 - 🟠 Опасность по БпЛА\n" +
      "4 - 🔴 Тревога по БпЛА\n" +
      "5 - ⚫ РАКЕТНАЯ ОПАСНОСТЬ"
);
if (lvls[num]) {
  var selected = lvls[num];
  // Красим сам регион
  var region = document.getElementById(shapeId);
  region.style.fill = selected.color;
  if(num === "5") {
    region.style.stroke = selected.border;
  } else {
    region.style.stroke = "#10b981";
  }
  // Красим зону ПВО этого региона
  var pvoCircle = document.getElementById(zoneId);
  if(pvoCircle) {
    pvoCircle.style.stroke = num === "1" ? "#33ff33" : (num === "5" ? "#ff0000" : selected.color);
  }
  alert("Тактический манёвр выполнен!\nВ " + regName + " объявлен: " + selected.text);
} else if (num !== null) {
  alert("Ошибка! Такого уровня нет в базе.");
}
