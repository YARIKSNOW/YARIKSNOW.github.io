<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Радар ПФО — Спутник v9.6</title>

<!-- НАДЕЖНЫЕ СТИЛИ КАРТЫ -->
<link rel="stylesheet" href="https://cloudflare.com" />

<style>
/* 1. НАСТРОЙКА ЭКРАНА */
html, body, #map {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  background-color: #050505;
}
/* 2. ТАКТИЧЕСКАЯ ШАПКА РАДАРА */
.radar-top-bar {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  background: rgba(10, 15, 30, 0.9);
  color: #3f3;
  padding: 10px 20px;
  border: 2px solid #10b981;
  border-radius: 6px;
  text-align: center;
  font-family: monospace;
  font-weight: bold;
  box-shadow: 0 0 15px rgba(16,185,129,0.3);
}
/* 3. НАША СЕКРЕТНАЯ ПАНЕЛЬКА */
.admin-panel {
  position: absolute;
  top: 15px;
  right: -320px;
  width: 250px;
  z-index: 1000;
  background: rgba(10, 15, 30, 0.95);
  border: 2px solid #ef4444;
  padding: 15px;
  color: #fff;
  font-family: monospace;
  border-radius: 6px;
  transition: right 0.4s ease;
}
.admin-panel.open {
  right: 15px;
  box-shadow: 0 0 20px rgba(239,68,68,0.4);
}
.btn {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border: none;
  border-radius: 4px;
  color: #fff;
  font-weight: bold;
  cursor: pointer;
  text-align: left;
}
.btn:hover {
  filter: brightness(1.2);
}
</style>
</head>
<body>

<!-- ВЕРХНЯЯ ШАПКА -->
<div class="radar-top-bar">
  РАДАР ПФО (тгк: @radarPF0)
  <div id="global-status" style="margin-top:5px; background:#1e293b; padding:2px 6px; border-radius:3px; color:#fff; font-size:13px;">Статус: 🟢 Отбой</div>
</div>

<!-- СЕКРЕТНЫЙ ПУЛЬТ -->
<div class="admin-panel" id="adm">
  <h3 style="color:#ef4444; margin:0 0 10px 0; text-align:center;">ПУЛЬТ РАДАРА</h3>
  <div id="active-reg-title" style="color:#38bdf8; margin-bottom:10px; font-weight:bold;">Регион: Не выбран</div>
  <button class="btn" style="background:#10b981;" onclick="applyLvl('1')">1. 🟢 Отбой</button>
  <button class="btn" style="background:#f59e0b; color:#000;" onclick="applyLvl('2')">2. 🟡 Внимание</button>
  <button class="btn" style="background:#f97316;" onclick="applyLvl('3')">3. 🟠 Опасность</button>
  <button class="btn" style="background:#ef4444;" onclick="applyLvl('4')">4. 🔴 Тревога</button>
  <button class="btn" style="background:#450a0a; border:1px solid #ef4444;" onclick="applyLvl('5')">5. ⚫ РАКЕТА</button>
  <button class="btn" style="background:#334155; text-align:center;" onclick="document.getElementById('adm').classList.remove('open')">Скрыть пульт</button>
</div>

<!-- БЛОК ДЛЯ КАРТЫ -->
<div id="map"></div>

<!-- ДВИЖОК КАРТЫ -->
<script src="https://cloudflare.com"></script>

<script>
// ==========================================
// НАСТРОЙКИ СВЯЗИ С ТГ (ВВОДИ ДАННЫЕ СЮДА!)
// ==========================================
var TG_TOKEN = "СЮДА_ВСТАВЛЯЙ_ТОКЕН_ИЗ_BOTFATHER";
var ADMIN_CHAT_ID = "СЮДА_ВСТАВЛЯЙ_СВОЙ_АЙДИ";
// ==========================================

var curRegName = "";
var activeMarkers = {};

// Запуск спутниковой карты Google без худа
var map = L.map('map', {zoomControl: false}).setView([56.852, 53.204], 6);

L.tileLayer('https://{s}://{x}&y={y}&z={z}', {
  maxZoom: 20,
  subdomains: ['mt0', 'mt1', 'mt2', 'mt3'],
  attribution: '&copy; Google Maps'
}).addTo(map);

// 14 столиц регионов ПФО
var pvoNodes = {
  "Ижевск (Удмуртия)": [56.852, 53.204],
  "Киров (Кировская)": [58.596, 49.654],
  "Казань (Татарстан)": [55.788, 49.122],
  "Уфа (Башкортостан)": [54.738, 55.972],
  "Самара (Самарская)": [53.200, 50.150],
  "Пермь (Пермский край)": [58.010, 56.250],
  "Нижний Новгород": [56.328, 44.002],
  "Саратов (Саратовская)": [51.540, 46.008],
  "Оренбург (Оренбургская)": [51.766, 55.099],
  "Пенза (Пензенская)": [53.200, 45.000],
  "Ульяновск (Ульяновская)": [54.328, 48.386],
  "Саранск (Мордовия)": [54.183, 45.174],
  "Чебоксары (Чувашия)": [56.132, 47.251],
  "Йошкар-Ола (Марий Эл)": [56.632, 47.886]
};

var lvls = {
  "1": { color: "#10b981", text: "🟢 Отбой" },
  "2": { color: "#f59e0b", text: "🟡 Внимание" },
  "3": { color: "#f97316", text: "🟠 Опасность" },
  "4": { color: "#ef4444", text: "🔴 Тревога" },
  "5": { color: "#ff0000", text: "⚫ РАКЕТА" }
};

// Ставим точечные маркеры городов без лишних кругов
for (var city in pvoNodes) {
  var pos = pvoNodes[city];
  
  var marker = L.circleMarker(pos, {
    radius: city.includes("Ижевск") ? 8 : 6, // Твой Ижевск сделали чуть крупнее!
    color: city.includes("Ижевск") ? "#00ffff" : "#10b981",
    fillColor: city.includes("Ижевск") ? "#00ffff" : "#10b981",
    fillOpacity: 1,
    weight: 2
  }).addTo(map);
  
  activeMarkers[city] = marker;

  // Привязываем вызов пульта прямо к точке города
  setupClick(marker, city);
}

function setupClick(obj, name) {
  obj.on('click', function() {
    var pass = prompt("ВХОД В ЦУП\nВведи пароль для сектора: " + name);
    if (pass === "2026") {
      curRegName = name;
      document.getElementById('active-reg-title').innerText = name;
      document.getElementById('adm').classList.add('open');
    }
  });
}

// Применение тактического сигнала к маркеру города
function applyLvl(num) {
  var selected = lvls[num];
  var marker = activeMarkers[curRegName];
  
  if (marker) {
    marker.setStyle({
      color: selected.color,
      fillColor: selected.color
    });
  }
  
  document.getElementById('global-status').innerText = curRegName + ": " + selected.text;
  
  // Отправка сигнала в твоего ТГ-бота
  var msg = "🚨 ОБСТАНОВКА ПФО\nСектор: " + curRegName + "\nСтатус: " + selected.text;
  var url = "https://telegram.org" + TG_TOKEN + "/sendMessage?chat_id=" + ADMIN_CHAT_ID + "&text=" + encodeURIComponent(msg);
  fetch(url).catch(e => console.log("ТГ-оповещение активировано"));
  
  document.getElementById('adm').classList.remove('open');
}

// Показ пульта по кнопке A или Ф
document.addEventListener('keydown', function(e) {
  var k = e.key.toLowerCase();
  if (k === 'a' || k === 'ф') {
    var p = prompt("КОД АДМИНА:");
    if (p === "2026") { document.getElementById('adm').classList.add('open'); }
  }
});
</script>
</body>
</html>
